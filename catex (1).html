<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catex — Prise de rendez-vous</title>
<style>
  :root{
    --bg:#F4F7F8;
    --surface:#FFFFFF;
    --border:#DFE6E9;
    --text:#1E2A32;
    --text-muted:#657279;
    --primary:#2C6E7F;
    --primary-dark:#204F5B;
    --primary-soft:#E4EFF1;
    --danger:#B5473F;
    --danger-soft:#F7E6E4;
    --success:#3F8F6D;
    --success-soft:#E4F2EC;
    --warn:#B8863A;
    --warn-soft:#F5EEDF;
    --radius:10px;
    --shadow:0 1px 2px rgba(30,42,50,0.06), 0 4px 14px rgba(30,42,50,0.06);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
  }
  #app{min-height:100vh;display:flex;flex-direction:column;}

  /* Topbar */
  .topbar{
    background:var(--surface);
    border-bottom:1px solid var(--border);
    padding:14px 24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:sticky;top:0;z-index:20;
  }
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:20px;color:var(--primary-dark);}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--primary);display:inline-block;}
  .topbar-right{display:flex;align-items:center;gap:14px;}
  .userchip{font-size:13px;color:var(--text-muted);display:flex;align-items:center;gap:8px;}
  .userchip strong{color:var(--text);}
  .role-pill{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--primary-soft);color:var(--primary-dark);font-weight:600;letter-spacing:.02em;}

  button{font-family:inherit;cursor:pointer;}
  .btn{
    border:1px solid var(--border);
    background:var(--surface);
    color:var(--text);
    padding:9px 16px;
    border-radius:8px;
    font-size:14px;
    font-weight:600;
    transition:.15s;
  }
  .btn:hover{border-color:var(--primary);}
  .btn-primary{background:var(--primary);color:#fff;border-color:var(--primary);}
  .btn-primary:hover{background:var(--primary-dark);}
  .btn-danger{background:var(--danger-soft);color:var(--danger);border-color:var(--danger-soft);}
  .btn-danger:hover{background:var(--danger);color:#fff;}
  .btn-ghost{background:transparent;border-color:transparent;color:var(--text-muted);}
  .btn-ghost:hover{color:var(--text);}
  .btn-sm{padding:6px 11px;font-size:12.5px;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}

  /* Notifications bell */
  .bell-wrap{position:relative;}
  .bell-btn{
    width:38px;height:38px;border-radius:50%;border:1px solid var(--border);
    background:var(--surface);display:flex;align-items:center;justify-content:center;
    font-size:17px;position:relative;
  }
  .bell-badge{
    position:absolute;top:-4px;right:-4px;background:var(--danger);color:#fff;
    font-size:10px;font-weight:700;min-width:16px;height:16px;border-radius:8px;
    display:flex;align-items:center;justify-content:center;padding:0 4px;
  }
  .bell-panel{
    position:absolute;right:0;top:46px;width:340px;max-height:420px;overflow-y:auto;
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:10px;display:none;
  }
  .bell-panel.open{display:block;}
  .bell-panel-header{display:flex;justify-content:space-between;align-items:center;padding:6px 6px 10px;border-bottom:1px solid var(--border);margin-bottom:6px;}
  .bell-panel-header h4{margin:0;font-size:14px;}
  .notif-item{padding:10px 8px;border-radius:8px;font-size:13px;line-height:1.4;}
  .notif-item.unread{background:var(--primary-soft);}
  .notif-item .n-date{display:block;font-size:11px;color:var(--text-muted);margin-top:3px;}
  .notif-empty{padding:20px 8px;text-align:center;color:var(--text-muted);font-size:13px;}

  /* Layout */
  .layout{display:flex;flex:1;}
  .sidebar{
    width:210px;background:var(--surface);border-right:1px solid var(--border);
    padding:18px 10px;flex-shrink:0;
  }
  .nav-item{
    display:block;width:100%;text-align:left;padding:10px 12px;border-radius:8px;
    border:none;background:transparent;color:var(--text-muted);font-size:14px;font-weight:600;
    margin-bottom:4px;
  }
  .nav-item:hover{background:var(--bg);color:var(--text);}
  .nav-item.active{background:var(--primary-soft);color:var(--primary-dark);}
  .main{flex:1;padding:28px 34px;max-width:980px;}
  .page-title{margin:0 0 4px;font-size:22px;}
  .page-sub{margin:0 0 24px;color:var(--text-muted);font-size:14px;}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:18px;}
  .card h3{margin:0 0 14px;font-size:15px;}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  label{display:block;font-size:12.5px;font-weight:600;color:var(--text-muted);margin-bottom:5px;}
  input,select{
    width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;
    font-size:14px;font-family:inherit;background:#fff;color:var(--text);
  }
  input:focus,select:focus{outline:2px solid var(--primary-soft);border-color:var(--primary);}
  .field{margin-bottom:14px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .hint{font-size:12px;color:var(--text-muted);margin-top:4px;}
  .error-msg{background:var(--danger-soft);color:var(--danger);padding:9px 12px;border-radius:8px;font-size:13px;margin-bottom:12px;}
  .success-msg{background:var(--success-soft);color:var(--success);padding:9px 12px;border-radius:8px;font-size:13px;margin-bottom:12px;}

  /* Auth screen */
  .auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:30px;}
  .auth-card{width:420px;background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);padding:30px;}
  .auth-logo{text-align:center;margin-bottom:6px;font-size:24px;font-weight:700;color:var(--primary-dark);}
  .auth-tagline{text-align:center;color:var(--text-muted);font-size:13px;margin-bottom:22px;}
  .tabs{display:flex;background:var(--bg);border-radius:9px;padding:4px;margin-bottom:20px;}
  .tab-btn{flex:1;padding:8px;border:none;background:transparent;border-radius:7px;font-size:13.5px;font-weight:600;color:var(--text-muted);}
  .tab-btn.active{background:var(--surface);color:var(--primary-dark);box-shadow:0 1px 3px rgba(0,0,0,.08);}
  .role-toggle{display:flex;gap:8px;margin-bottom:16px;}
  .role-btn{flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;background:var(--surface);font-size:13px;font-weight:600;color:var(--text-muted);}
  .role-btn.active{border-color:var(--primary);color:var(--primary-dark);background:var(--primary-soft);}
  .link-btn{background:none;border:none;color:var(--primary);font-size:13px;font-weight:600;padding:0;}
  .link-btn:hover{text-decoration:underline;}

  /* Modal */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(20,28,33,.45);display:none;
    align-items:center;justify-content:center;z-index:50;padding:20px;
  }
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border-radius:14px;padding:26px;width:400px;max-width:100%;box-shadow:var(--shadow);}
  .modal h3{margin-top:0;}

  /* Slots / appointments */
  .slot-day-group{margin-bottom:16px;}
  .slot-day-title{font-size:13px;font-weight:700;color:var(--text-muted);text-transform:capitalize;margin-bottom:8px;}
  .slot-list{display:flex;flex-wrap:wrap;gap:8px;}
  .slot-chip{
    border:1px solid var(--border);padding:8px 14px;border-radius:8px;font-size:13.5px;font-weight:600;
    background:var(--surface);display:flex;align-items:center;gap:8px;
  }
  .slot-chip.free{border-color:var(--primary);color:var(--primary-dark);}
  .slot-chip.free:hover{background:var(--primary-soft);}
  .appt-row{
    display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border:1px solid var(--border);
    border-radius:9px;margin-bottom:8px;
  }
  .appt-info{font-size:14px;}
  .appt-info .who{font-weight:700;}
  .appt-info .when{color:var(--text-muted);font-size:12.5px;margin-top:2px;}
  .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;}
  .badge.libre{background:var(--success-soft);color:var(--success);}
  .badge.reserve{background:var(--primary-soft);color:var(--primary-dark);}
  .badge.annule{background:var(--danger-soft);color:var(--danger);}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th,td{text-align:left;padding:10px 8px;border-bottom:1px solid var(--border);}
  th{color:var(--text-muted);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.03em;}
  .empty-state{text-align:center;padding:40px 10px;color:var(--text-muted);}
  .empty-state .icon{font-size:32px;margin-bottom:8px;}

  .search-result{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border:1px solid var(--border);border-radius:9px;margin-bottom:8px;}
  .avatar{width:36px;height:36px;border-radius:50%;background:var(--primary-soft);color:var(--primary-dark);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;margin-right:10px;}
  .toast-wrap{position:fixed;bottom:20px;right:20px;z-index:100;display:flex;flex-direction:column;gap:8px;}
  .toast{background:var(--text);color:#fff;padding:12px 16px;border-radius:8px;font-size:13.5px;box-shadow:var(--shadow);animation:slideIn .2s ease;}
  .toast.success{background:var(--success);}
  .toast.error{background:var(--danger);}
  @keyframes slideIn{from{transform:translateY(10px);opacity:0;}to{transform:translateY(0);opacity:1;}}

  @media(max-width:760px){
    .layout{flex-direction:column;}
    .sidebar{width:100%;display:flex;overflow-x:auto;border-right:none;border-bottom:1px solid var(--border);padding:10px;}
    .nav-item{white-space:nowrap;margin-bottom:0;margin-right:4px;}
    .main{padding:20px;}
    .grid-2{grid-template-columns:1fr;}
    .auth-card{width:100%;}
  }
</style>
</head>
<body>
<div id="app"></div>
<div class="toast-wrap" id="toastWrap"></div>

<script>
/* =========================================================
   CATEX — prototype de prise de rendez-vous (style Doctolib)
   Stockage : window.storage (persistant, partagé = true)
   ========================================================= */

const GERANT_CODE = "CATEX2026GERANT"; // code d'accès pour créer un compte gérant

let state = {
  view: "auth",         // auth | client | manager
  authTab: "login",     // login | register
  authRole: "client",   // client | gerant
  currentUser: null,
  activeSection: null,
  bellOpen: false,
  forgotOpen: false,
  forgotStep: 1,
  forgotEmail: "",
  users: [],
  slots: [],
  notifs: [],
};

/* ---------- Helpers stockage ---------- */
async function safeGet(key, shared){
  try{ const r = await window.storage.get(key, shared); return r ? r.value : null; }
  catch(e){ return null; }
}
async function safeSet(key, value, shared){
  try{ return await window.storage.set(key, value, shared); }
  catch(e){ console.error("storage set error", e); return null; }
}
async function safeList(prefix, shared){
  try{ const r = await window.storage.list(prefix, shared); return r ? r.keys : []; }
  catch(e){ return []; }
}
function j(v){ return JSON.stringify(v); }
function parse(v, fallback){ try{ return JSON.parse(v); }catch(e){ return fallback; } }

/* ---------- Chargement des données ---------- */
async function loadUsers(){
  const keys = await safeList("user:", true);
  const users = [];
  for(const k of keys){
    const v = await safeGet(k, true);
    if(v) users.push(parse(v, null));
  }
  state.users = users.filter(Boolean);
}
async function loadSlots(){
  const v = await safeGet("slots", true);
  state.slots = v ? parse(v, []) : [];
}
async function loadNotifs(email){
  if(!email){ state.notifs = []; return; }
  const v = await safeGet("notif:"+email, true);
  state.notifs = v ? parse(v, []) : [];
}
async function saveSlots(){ await safeSet("slots", j(state.slots), true); }
async function saveUser(u){ await safeSet("user:"+u.email, j(u), true); }
async function pushNotif(email, message){
  const v = await safeGet("notif:"+email, true);
  const list = v ? parse(v, []) : [];
  list.unshift({ id: "n"+Date.now()+Math.random().toString(36).slice(2,6), message, date: new Date().toISOString(), lu:false });
  await safeSet("notif:"+email, j(list), true);
}
async function loadAll(){
  await loadUsers();
  await loadSlots();
  if(state.currentUser) await loadNotifs(state.currentUser.email);
}

/* ---------- Utilitaires ---------- */
function findUser(email){ return state.users.find(u => u.email.toLowerCase() === (email||"").toLowerCase()); }
function fmtDate(iso){
  try{
    const d = new Date(iso+"T00:00:00");
    return d.toLocaleDateString("fr-FR", { weekday:"long", day:"numeric", month:"long", year:"numeric" });
  }catch(e){ return iso; }
}
function fmtDateShort(iso){
  try{
    const d = new Date(iso+"T00:00:00");
    return d.toLocaleDateString("fr-FR", { day:"2-digit", month:"2-digit", year:"numeric" });
  }catch(e){ return iso; }
}
function villeFromAdresse(adresse){
  if(!adresse) return "";
  const parts = adresse.split(",");
  return parts.length>1 ? parts[parts.length-1].trim() : adresse;
}
function initiales(u){
  return ((u.prenom||"?")[0]+(u.nom||"?")[0]).toUpperCase();
}
function toast(msg, type){
  const wrap = document.getElementById("toastWrap");
  const el = document.createElement("div");
  el.className = "toast " + (type||"");
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(()=>{ el.remove(); }, 3200);
}

/* ---------- Rendu racine ---------- */
async function render(){
  const app = document.getElementById("app");
  if(state.view === "auth"){
    app.innerHTML = renderAuth();
    bindAuthEvents();
    return;
  }
  app.innerHTML = renderShell();
  bindShellEvents();
}

/* ================= AUTH ================= */
function renderAuth(){
  return `
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo"><span style="color:var(--primary)">●</span> Catex</div>
      <div class="auth-tagline">Prenez rendez-vous en quelques clics</div>
      <div class="tabs">
        <button class="tab-btn ${state.authTab==='login'?'active':''}" data-tab="login">Connexion</button>
        <button class="tab-btn ${state.authTab==='register'?'active':''}" data-tab="register">Créer un compte</button>
      </div>
      <div id="authError"></div>
      ${state.authTab==='login' ? renderLoginForm() : renderRegisterForm()}
    </div>
  </div>
  ${renderForgotModal()}
  `;
}

function renderLoginForm(){
  return `
    <form id="loginForm">
      <div class="field">
        <label>Adresse e-mail</label>
        <input type="email" id="loginEmail" required placeholder="vous@exemple.fr">
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input type="password" id="loginPassword" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:6px;">Se connecter</button>
      <div style="text-align:center;margin-top:14px;">
        <button type="button" class="link-btn" id="forgotBtn">Mot de passe oublié ?</button>
      </div>
    </form>
  `;
}

function renderRegisterForm(){
  return `
    <form id="registerForm">
      <div class="role-toggle">
        <button type="button" class="role-btn ${state.authRole==='client'?'active':''}" data-role="client">Je suis client</button>
        <button type="button" class="role-btn ${state.authRole==='gerant'?'active':''}" data-role="gerant">Je suis gérant</button>
      </div>
      <div class="grid-2">
        <div class="field"><label>Prénom</label><input type="text" id="regPrenom" required></div>
        <div class="field"><label>Nom</label><input type="text" id="regNom" required></div>
      </div>
      <div class="field"><label>Adresse e-mail</label><input type="email" id="regEmail" required></div>
      <div class="field"><label>Numéro de téléphone</label><input type="tel" id="regTel" required placeholder="06 12 34 56 78"></div>
      <div class="field"><label>Adresse postale</label><input type="text" id="regAdresse" required placeholder="12 rue des Lilas, Nantes"></div>
      <div class="grid-2">
        <div class="field"><label>Mot de passe</label><input type="password" id="regPassword" required></div>
        <div class="field"><label>Confirmer</label><input type="password" id="regPassword2" required></div>
      </div>
      ${state.authRole==='gerant' ? `
      <div class="field">
        <label>Code d'accès gérant</label>
        <input type="text" id="regCode" required placeholder="Code fourni par Catex">
        <div class="hint">Ce code vous a été communiqué lors de votre inscription en tant que professionnel.</div>
      </div>` : ``}
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:6px;">Créer mon compte</button>
    </form>
  `;
}

function renderForgotModal(){
  if(!state.forgotOpen) return "";
  let body = "";
  if(state.forgotStep === 1){
    body = `
      <div class="field"><label>Adresse e-mail</label><input type="email" id="fgEmail" placeholder="vous@exemple.fr"></div>
      <div class="field"><label>Numéro de téléphone associé</label><input type="tel" id="fgTel" placeholder="06 12 34 56 78"></div>
      <div class="hint" style="margin-bottom:14px;">Nous vérifions votre identité à partir de l'e-mail et du téléphone renseignés à l'inscription.</div>
      <button class="btn btn-primary" style="width:100%;" id="fgVerifyBtn">Vérifier mon identité</button>
    `;
  } else {
    body = `
      <div class="field"><label>Nouveau mot de passe</label><input type="password" id="fgNewPass"></div>
      <div class="field"><label>Confirmer le mot de passe</label><input type="password" id="fgNewPass2"></div>
      <button class="btn btn-primary" style="width:100%;" id="fgResetBtn">Réinitialiser le mot de passe</button>
    `;
  }
  return `
  <div class="modal-overlay open" id="forgotOverlay">
    <div class="modal">
      <h3>Mot de passe oublié</h3>
      <div id="forgotMsg"></div>
      ${body}
      <div style="text-align:center;margin-top:14px;">
        <button class="link-btn" id="forgotCancel">Annuler</button>
      </div>
    </div>
  </div>`;
}

function bindAuthEvents(){
  document.querySelectorAll(".tab-btn").forEach(b=>{
    b.onclick = ()=>{ state.authTab = b.dataset.tab; render(); };
  });
  document.querySelectorAll(".role-btn").forEach(b=>{
    b.onclick = ()=>{ state.authRole = b.dataset.role; render(); };
  });

  const loginForm = document.getElementById("loginForm");
  if(loginForm) loginForm.onsubmit = async (e)=>{
    e.preventDefault();
    const email = document.getElementById("loginEmail").value.trim();
    const pass = document.getElementById("loginPassword").value;
    await loadUsers();
    const u = findUser(email);
    if(!u || u.password !== pass){
      showAuthError("E-mail ou mot de passe incorrect.");
      return;
    }
    state.currentUser = u;
    state.view = u.role === "gerant" ? "manager" : "client";
    state.activeSection = u.role === "gerant" ? "agenda" : "reserver";
    await loadAll();
    render();
  };

  const registerForm = document.getElementById("registerForm");
  if(registerForm) registerForm.onsubmit = async (e)=>{
    e.preventDefault();
    const prenom = document.getElementById("regPrenom").value.trim();
    const nom = document.getElementById("regNom").value.trim();
    const email = document.getElementById("regEmail").value.trim().toLowerCase();
    const tel = document.getElementById("regTel").value.trim();
    const adresse = document.getElementById("regAdresse").value.trim();
    const pass = document.getElementById("regPassword").value;
    const pass2 = document.getElementById("regPassword2").value;

    if(pass !== pass2){ showAuthError("Les mots de passe ne correspondent pas."); return; }
    if(state.authRole === "gerant"){
      const code = document.getElementById("regCode").value.trim();
      if(code !== GERANT_CODE){ showAuthError("Code d'accès gérant invalide."); return; }
    }
    await loadUsers();
    if(findUser(email)){ showAuthError("Un compte existe déjà avec cet e-mail."); return; }

    const newUser = { email, password: pass, nom, prenom, telephone: tel, adresse, role: state.authRole };
    await saveUser(newUser);
    state.users.push(newUser);
    state.currentUser = newUser;
    state.view = newUser.role === "gerant" ? "manager" : "client";
    state.activeSection = newUser.role === "gerant" ? "agenda" : "reserver";
    await loadAll();
    toast("Compte créé avec succès. Bienvenue sur Catex !", "success");
    render();
  };

  const forgotBtn = document.getElementById("forgotBtn");
  if(forgotBtn) forgotBtn.onclick = ()=>{ state.forgotOpen = true; state.forgotStep = 1; render(); };
  const forgotCancel = document.getElementById("forgotCancel");
  if(forgotCancel) forgotCancel.onclick = ()=>{ state.forgotOpen = false; render(); };

  const fgVerifyBtn = document.getElementById("fgVerifyBtn");
  if(fgVerifyBtn) fgVerifyBtn.onclick = async ()=>{
    const email = document.getElementById("fgEmail").value.trim().toLowerCase();
    const tel = document.getElementById("fgTel").value.trim();
    await loadUsers();
    const u = findUser(email);
    if(!u || u.telephone.replace(/\s/g,"") !== tel.replace(/\s/g,"")){
      document.getElementById("forgotMsg").innerHTML = `<div class="error-msg">Aucun compte ne correspond à ces informations.</div>`;
      return;
    }
    state.forgotEmail = email;
    state.forgotStep = 2;
    render();
  };
  const fgResetBtn = document.getElementById("fgResetBtn");
  if(fgResetBtn) fgResetBtn.onclick = async ()=>{
    const p1 = document.getElementById("fgNewPass").value;
    const p2 = document.getElementById("fgNewPass2").value;
    if(!p1 || p1 !== p2){
      document.getElementById("forgotMsg").innerHTML = `<div class="error-msg">Les mots de passe ne correspondent pas.</div>`;
      return;
    }
    const u = findUser(state.forgotEmail);
    u.password = p1;
    await saveUser(u);
    state.forgotOpen = false;
    toast("Mot de passe réinitialisé. Vous pouvez vous connecter.", "success");
    render();
  };
}
function showAuthError(msg){
  const el = document.getElementById("authError");
  if(el) el.innerHTML = `<div class="error-msg">${msg}</div>`;
}

/* ================= SHELL (client + manager) ================= */
function renderShell(){
  const u = state.currentUser;
  const isManager = u.role === "gerant";
  const navItems = isManager
    ? [["agenda","Agenda"],["disponibilites","Disponibilités"],["clients","Mes clients"],["profil","Mon espace"]]
    : [["reserver","Prendre RDV"],["mesrdv","Mes RDV"],["rechercher","Rechercher"],["profil","Mon espace"]];

  const unread = state.notifs.filter(n=>!n.lu).length;

  return `
  <div class="topbar">
    <div class="brand"><span class="dot"></span> Catex</div>
    <div class="topbar-right">
      <div class="userchip">
        <strong>${u.prenom} ${u.nom}</strong>
        <span class="role-pill">${isManager ? "Gérant" : "Client"}</span>
      </div>
      <div class="bell-wrap">
        <button class="bell-btn" id="bellBtn">🔔 ${unread>0?`<span class="bell-badge">${unread}</span>`:""}</button>
        <div class="bell-panel ${state.bellOpen?'open':''}" id="bellPanel">
          <div class="bell-panel-header">
            <h4>Notifications</h4>
            <button class="link-btn" id="markAllRead">Tout marquer lu</button>
          </div>
          ${state.notifs.length===0 ? `<div class="notif-empty">Aucune notification pour le moment.</div>` :
            state.notifs.map(n=>`
              <div class="notif-item ${n.lu?'':'unread'}">
                ${n.message}
                <span class="n-date">${new Date(n.date).toLocaleString("fr-FR")}</span>
              </div>`).join("")}
        </div>
      </div>
      <button class="btn btn-ghost btn-sm" id="logoutBtn">Déconnexion</button>
    </div>
  </div>
  <div class="layout">
    <div class="sidebar">
      ${navItems.map(([key,label])=>`
        <button class="nav-item ${state.activeSection===key?'active':''}" data-section="${key}">${label}</button>
      `).join("")}
    </div>
    <div class="main" id="mainContent">
      ${isManager ? renderManagerSection(state.activeSection) : renderClientSection(state.activeSection)}
    </div>
  </div>
  `;
}

function bindShellEvents(){
  document.getElementById("logoutBtn").onclick = ()=>{
    state.currentUser = null;
    state.view = "auth";
    state.authTab = "login";
    render();
  };
  document.getElementById("bellBtn").onclick = (e)=>{
    e.stopPropagation();
    state.bellOpen = !state.bellOpen;
    render();
  };
  document.getElementById("markAllRead").onclick = async (e)=>{
    e.stopPropagation();
    state.notifs.forEach(n=>n.lu=true);
    await safeSet("notif:"+state.currentUser.email, j(state.notifs), true);
    render();
  };
  document.querySelectorAll(".nav-item").forEach(b=>{
    b.onclick = ()=>{ state.activeSection = b.dataset.section; state.bellOpen=false; render(); };
  });
  document.addEventListener("click", (e)=>{
    const panel = document.getElementById("bellPanel");
    const btn = document.getElementById("bellBtn");
    if(panel && state.bellOpen && !panel.contains(e.target) && e.target!==btn){
      state.bellOpen = false; render();
    }
  }, { once:true });

  bindSectionEvents();
}

/* ================= PROFIL (commun) ================= */
function renderProfilForm(u){
  return `
  <h1 class="page-title">Mon espace</h1>
  <p class="page-sub">Vos informations personnelles, visibles uniquement par vous ${u.role==='client' ? 'et votre gérant' : ''}.</p>
  <div class="card">
    <h3>Informations personnelles</h3>
    <form id="profilForm">
      <div class="grid-2">
        <div class="field"><label>Prénom</label><input type="text" id="pfPrenom" value="${u.prenom}" required></div>
        <div class="field"><label>Nom</label><input type="text" id="pfNom" value="${u.nom}" required></div>
      </div>
      <div class="field"><label>Adresse e-mail</label><input type="email" id="pfEmail" value="${u.email}" disabled></div>
      <div class="field"><label>Numéro de téléphone</label><input type="tel" id="pfTel" value="${u.telephone}" required></div>
      <div class="field"><label>Adresse postale</label><input type="text" id="pfAdresse" value="${u.adresse}" required></div>
      <button type="submit" class="btn btn-primary">Enregistrer les modifications</button>
    </form>
  </div>
  <div class="card">
    <h3>Changer de mot de passe</h3>
    <form id="pwForm">
      <div class="field"><label>Nouveau mot de passe</label><input type="password" id="pfNewPass" required></div>
      <button type="submit" class="btn">Mettre à jour le mot de passe</button>
    </form>
  </div>
  `;
}
function bindProfilEvents(){
  const f = document.getElementById("profilForm");
  if(f) f.onsubmit = async (e)=>{
    e.preventDefault();
    const u = state.currentUser;
    u.prenom = document.getElementById("pfPrenom").value.trim();
    u.nom = document.getElementById("pfNom").value.trim();
    u.telephone = document.getElementById("pfTel").value.trim();
    u.adresse = document.getElementById("pfAdresse").value.trim();
    await saveUser(u);
    toast("Profil mis à jour.", "success");
    render();
  };
  const pw = document.getElementById("pwForm");
  if(pw) pw.onsubmit = async (e)=>{
    e.preventDefault();
    const u = state.currentUser;
    u.password = document.getElementById("pfNewPass").value;
    await saveUser(u);
    toast("Mot de passe mis à jour.", "success");
    document.getElementById("pfNewPass").value = "";
  };
}

/* ================= ESPACE CLIENT ================= */
function renderClientSection(section){
  const u = state.currentUser;
  if(section === "reserver") return renderReserver();
  if(section === "mesrdv") return renderMesRdv();
  if(section === "rechercher") return renderRechercher();
  return renderProfilForm(u);
}

function renderReserver(){
  const libres = state.slots.filter(s=>s.statut==="libre").sort((a,b)=> (a.date+a.heure).localeCompare(b.date+b.heure));
  const byDay = {};
  libres.forEach(s=>{ (byDay[s.date] = byDay[s.date]||[]).push(s); });
  const days = Object.keys(byDay).sort();

  return `
  <h1 class="page-title">Prendre rendez-vous</h1>
  <p class="page-sub">Choisissez un créneau disponible auprès de votre gérant.</p>
  <div class="card">
    ${days.length===0 ? `
      <div class="empty-state">
        <div class="icon">📅</div>
        <div>Aucun créneau disponible pour le moment. Revenez bientôt !</div>
      </div>` :
      days.map(day=>`
        <div class="slot-day-group">
          <div class="slot-day-title">${fmtDate(day)}</div>
          <div class="slot-list">
            ${byDay[day].map(s=>`
              <button class="slot-chip free" data-slot="${s.id}">${s.heure}</button>
            `).join("")}
          </div>
        </div>
      `).join("")
    }
  </div>
  `;
}

function renderMesRdv(){
  const u = state.currentUser;
  const mine = state.slots.filter(s=>s.clientEmail===u.email).sort((a,b)=>(a.date+a.heure).localeCompare(b.date+b.heure));
  return `
  <h1 class="page-title">Mes rendez-vous</h1>
  <p class="page-sub">Retrouvez ici l'ensemble de vos rendez-vous, à venir et passés.</p>
  <div class="card">
    ${mine.length===0 ? `
      <div class="empty-state"><div class="icon">🗒️</div><div>Vous n'avez aucun rendez-vous pour l'instant.</div></div>` :
      mine.map(s=>`
        <div class="appt-row">
          <div class="appt-info">
            <div class="who">Rendez-vous</div>
            <div class="when">${fmtDate(s.date)} à ${s.heure}</div>
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            <span class="badge ${s.statut}">${s.statut==='reserve'?'Confirmé':s.statut}</span>
            ${s.statut==='reserve' ? `<button class="btn btn-danger btn-sm" data-cancel="${s.id}">Annuler</button>` : ``}
          </div>
        </div>
      `).join("")
    }
  </div>
  `;
}

function renderRechercher(){
  return `
  <h1 class="page-title">Rechercher un client</h1>
  <p class="page-sub">Retrouvez d'autres clients inscrits sur Catex par leur nom ou prénom.</p>
  <div class="card">
    <div class="field"><input type="text" id="searchInput" placeholder="Rechercher par nom ou prénom..."></div>
    <div id="searchResults"></div>
  </div>
  `;
}

function bindClientEvents(section){
  if(section === "reserver"){
    document.querySelectorAll("[data-slot]").forEach(btn=>{
      btn.onclick = async ()=>{
        const slotId = btn.dataset.slot;
        const slot = state.slots.find(s=>s.id===slotId);
        if(!slot || slot.statut!=="libre") return;
        slot.statut = "reserve";
        slot.clientEmail = state.currentUser.email;
        await saveSlots();
        const u = state.currentUser;
        // notifier tous les gérants
        const gerants = state.users.filter(x=>x.role==="gerant");
        for(const g of gerants){
          await pushNotif(g.email, `${u.prenom} ${u.nom} a pris rendez-vous le ${fmtDateShort(slot.date)} à ${slot.heure}.`);
        }
        await pushNotif(u.email, `Votre rendez-vous du ${fmtDateShort(slot.date)} à ${slot.heure} est confirmé.`);
        await loadNotifs(u.email);
        toast("Rendez-vous confirmé !", "success");
        state.activeSection = "mesrdv";
        render();
      };
    });
  }
  if(section === "mesrdv"){
    document.querySelectorAll("[data-cancel]").forEach(btn=>{
      btn.onclick = async ()=>{
        const slotId = btn.dataset.cancel;
        const slot = state.slots.find(s=>s.id===slotId);
        if(!slot) return;
        const u = state.currentUser;
        slot.statut = "libre";
        slot.clientEmail = null;
        await saveSlots();
        const gerants = state.users.filter(x=>x.role==="gerant");
        for(const g of gerants){
          await pushNotif(g.email, `${u.prenom} ${u.nom} a annulé son rendez-vous du ${fmtDateShort(slot.date)} à ${slot.heure}.`);
        }
        await pushNotif(u.email, `Vous avez annulé votre rendez-vous du ${fmtDateShort(slot.date)} à ${slot.heure}.`);
        await loadNotifs(u.email);
        toast("Rendez-vous annulé.", "success");
        render();
      };
    });
  }
  if(section === "rechercher"){
    const input = document.getElementById("searchInput");
    const resultsEl = document.getElementById("searchResults");
    const doSearch = ()=>{
      const q = input.value.trim().toLowerCase();
      const me = state.currentUser.email;
      let matches = [];
      if(q.length>0){
        matches = state.users.filter(x=>
          x.role==="client" &&
          x.email!==me &&
          ((x.nom||"").toLowerCase().includes(q) || (x.prenom||"").toLowerCase().includes(q))
        );
      }
      if(q.length===0){
        resultsEl.innerHTML = "";
        return;
      }
      resultsEl.innerHTML = matches.length===0 ? `<div class="empty-state"><div class="icon">🔍</div><div>Aucun client trouvé.</div></div>` :
        matches.map(x=>`
          <div class="search-result">
            <div style="display:flex;align-items:center;">
              <div class="avatar">${initiales(x)}</div>
              <div>
                <div style="font-weight:700;">${x.prenom} ${x.nom}</div>
                <div style="font-size:12.5px;color:var(--text-muted);">${villeFromAdresse(x.adresse)}</div>
              </div>
            </div>
          </div>
        `).join("");
    };
    input.oninput = doSearch;
  }
  bindProfilEvents();
}

/* ================= ESPACE GÉRANT ================= */
function renderManagerSection(section){
  const u = state.currentUser;
  if(section === "agenda") return renderAgenda();
  if(section === "disponibilites") return renderDisponibilites();
  if(section === "clients") return renderClientsList();
  return renderProfilForm(u);
}

function renderAgenda(){
  const rdv = state.slots.filter(s=>s.statut==="reserve").sort((a,b)=>(a.date+a.heure).localeCompare(b.date+b.heure));
  const byDay = {};
  rdv.forEach(s=>{ (byDay[s.date]=byDay[s.date]||[]).push(s); });
  const days = Object.keys(byDay).sort();

  return `
  <h1 class="page-title">Agenda</h1>
  <p class="page-sub">Vue d'ensemble de tous les rendez-vous pris par vos clients.</p>
  <div class="card">
    ${days.length===0 ? `
      <div class="empty-state"><div class="icon">📖</div><div>Aucun rendez-vous programmé pour le moment.</div></div>` :
      days.map(day=>`
        <div class="slot-day-group">
          <div class="slot-day-title">${fmtDate(day)}</div>
          ${byDay[day].map(s=>{
            const client = findUser(s.clientEmail) || {prenom:"?",nom:"?"};
            return `
            <div class="appt-row">
              <div class="appt-info">
                <div class="who">${client.prenom} ${client.nom}</div>
                <div class="when">${s.heure} · ${client.telephone||""} · ${client.email}</div>
              </div>
              <div style="display:flex;align-items:center;gap:10px;">
                <span class="badge reserve">Confirmé</span>
                <button class="btn btn-danger btn-sm" data-cancel-mgr="${s.id}">Annuler</button>
              </div>
            </div>`;
          }).join("")}
        </div>
      `).join("")
    }
  </div>
  `;
}

function renderDisponibilites(){
  const libres = state.slots.filter(s=>s.statut==="libre").sort((a,b)=>(a.date+a.heure).localeCompare(b.date+b.heure));
  const byDay = {};
  libres.forEach(s=>{ (byDay[s.date]=byDay[s.date]||[]).push(s); });
  const days = Object.keys(byDay).sort();

  return `
  <h1 class="page-title">Mes disponibilités</h1>
  <p class="page-sub">Ajoutez des créneaux pour permettre à vos clients de prendre rendez-vous.</p>
  <div class="card">
    <h3>Ajouter un créneau</h3>
    <form id="addSlotForm">
      <div class="row">
        <div class="field" style="flex:1;min-width:160px;"><label>Date</label><input type="date" id="slotDate" required></div>
        <div class="field" style="flex:1;min-width:120px;"><label>Heure</label><input type="time" id="slotHeure" required></div>
      </div>
      <button type="submit" class="btn btn-primary">Ajouter le créneau</button>
    </form>
  </div>
  <div class="card">
    <h3>Créneaux disponibles à venir</h3>
    ${days.length===0 ? `<div class="empty-state"><div class="icon">🕒</div><div>Aucun créneau disponible. Ajoutez-en un ci-dessus.</div></div>` :
      days.map(day=>`
        <div class="slot-day-group">
          <div class="slot-day-title">${fmtDate(day)}</div>
          <div class="slot-list">
            ${byDay[day].map(s=>`
              <span class="slot-chip">${s.heure} <button class="btn-ghost" style="border:none;background:none;color:var(--danger);font-weight:700;" data-remove-slot="${s.id}">✕</button></span>
            `).join("")}
          </div>
        </div>
      `).join("")
    }
  </div>
  `;
}

function renderClientsList(){
  const clients = state.users.filter(x=>x.role==="client");
  return `
  <h1 class="page-title">Mes clients</h1>
  <p class="page-sub">Liste complète de vos clients et de leurs informations personnelles.</p>
  <div class="card">
    <div class="field"><input type="text" id="clientSearch" placeholder="Rechercher un client par nom, prénom ou e-mail..."></div>
    <table>
      <thead><tr><th>Nom</th><th>Prénom</th><th>E-mail</th><th>Téléphone</th><th>Adresse</th></tr></thead>
      <tbody id="clientsTbody">
        ${clients.length===0 ? `<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:20px;">Aucun client inscrit pour le moment.</td></tr>` :
          clients.map(c=>`
            <tr data-row="${c.email}">
              <td>${c.nom}</td><td>${c.prenom}</td><td>${c.email}</td><td>${c.telephone}</td><td>${c.adresse}</td>
            </tr>
          `).join("")
        }
      </tbody>
    </table>
  </div>
  `;
}

function bindManagerEvents(section){
  if(section === "agenda"){
    document.querySelectorAll("[data-cancel-mgr]").forEach(btn=>{
      btn.onclick = async ()=>{
        const slotId = btn.dataset.cancelMgr;
        const slot = state.slots.find(s=>s.id===slotId);
        if(!slot) return;
        const client = findUser(slot.clientEmail);
        slot.statut = "libre";
        slot.clientEmail = null;
        await saveSlots();
        if(client){
          await pushNotif(client.email, `Votre gérant a annulé votre rendez-vous du ${fmtDateShort(slot.date)} à ${slot.heure}.`);
        }
        toast("Rendez-vous annulé.", "success");
        render();
      };
    });
  }
  if(section === "disponibilites"){
    const form = document.getElementById("addSlotForm");
    if(form) form.onsubmit = async (e)=>{
      e.preventDefault();
      const date = document.getElementById("slotDate").value;
      const heure = document.getElementById("slotHeure").value;
      if(!date || !heure) return;
      const exists = state.slots.some(s=>s.date===date && s.heure===heure);
      if(exists){ toast("Ce créneau existe déjà.", "error"); return; }
      state.slots.push({ id:"s"+Date.now()+Math.random().toString(36).slice(2,6), date, heure, statut:"libre", clientEmail:null });
      await saveSlots();
      toast("Créneau ajouté.", "success");
      render();
    };
    document.querySelectorAll("[data-remove-slot]").forEach(btn=>{
      btn.onclick = async ()=>{
        const id = btn.dataset.removeSlot;
        state.slots = state.slots.filter(s=>s.id!==id);
        await saveSlots();
        render();
      };
    });
  }
  if(section === "clients"){
    const input = document.getElementById("clientSearch");
    input.oninput = ()=>{
      const q = input.value.trim().toLowerCase();
      document.querySelectorAll("#clientsTbody tr[data-row]").forEach(tr=>{
        const text = tr.textContent.toLowerCase();
        tr.style.display = text.includes(q) ? "" : "none";
      });
    };
  }
  bindProfilEvents();
}

function bindSectionEvents(){
  const isManager = state.currentUser.role === "gerant";
  if(isManager) bindManagerEvents(state.activeSection);
  else bindClientEvents(state.activeSection);
}

/* ---------- Démarrage ---------- */
(async function start(){
  await loadUsers();
  await loadSlots();
  render();
  // rafraîchissement léger pour simuler le temps réel (agenda / notifications)
  setInterval(async ()=>{
    if(state.view === "auth") return;
    await loadUsers();
    await loadSlots();
    if(state.currentUser) await loadNotifs(state.currentUser.email);
    render();
  }, 8000);
})();
</script>
</body>
</html>
